<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Juego del Dinosaurio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Contenedor principal del juego -->
    <div id="gameContainer" class="game-container">
      <!-- Lienzo donde se dibuja el juego -->
      <canvas id="gameCanvas"></canvas>
      <!-- HUD (Head-Up Display): puntuación y contador de inicio -->
      <div id="hud">
        <div id="scoreDisplay">Puntuación: 0</div>
        <div id="countdown"></div>
      </div>
    </div>

    <!-- Overlay mostrado al finalizar la partida -->
    <div id="overlay" class="hidden">
      <div id="gameOverBox" class="game-over-box">
        <!-- Título del overlay -->
        <h2 id="gameOverTitle">Game Over</h2>
        <!-- Puntuación final mostrada al jugador -->
        <p id="finalScore">Puntuación: 0</p>
        <!-- Botón para reiniciar (inicia delay y resetea estado) -->
        <button id="restartBtn">Reiniciar</button>
        <!-- Lista con los mejores intentos obtenidos del servidor -->
        <h3>Scoreboard (Top)</h3>
        <ol id="scoreboardList"></ol>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Juego del Dinosaurio</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1 class="title">Capibara Underground</h1>

    <!-- Contenedor principal del juego -->
    <div id="gameContainer" class="game-container">
      <!-- Lienzo donde se dibuja el juego -->
      <canvas id="gameCanvas"></canvas>

      <!-- HUD -->
      <div id="hud">
        <div id="scoreDisplay">Puntuación: 0</div>
        <div id="countdown"></div>
      </div>

      <!-- Overlay Game Over -->
      <div id="overlay" class="hidden">
        <div id="gameOverBox" class="game-over-box">
          <h2 id="gameOverTitle">Game Over</h2>

          <p id="finalScore">Puntuación: 0</p>

          <button id="restartBtn">Reiniciar</button>

          <!-- Tabla de scores -->
          <h3>Mejores puntuaciones</h3>

          <table id="scoreTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Puntos</th>
              </tr>
            </thead>

            <tbody id="scoreTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js?v=15"></script>
  </body>
</html>
